<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTS School Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main class="login-container">
        <img src="assets/organization-logo.png" alt="MTS Logo" class="logo">
        <h1 class="login-title">School Portal Sign In</h1>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
                <span class="validation-message" id="user-msg"></span>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
                <span class="validation-message" id="pass-msg"></span>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
